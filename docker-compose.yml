version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: incident_cortex
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cortex_net

  chromadb:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    environment:
      ALLOW_RESET: "TRUE"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - cortex_net

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cortex_net

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    networks:
      - cortex_net

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    networks:
      - cortex_net

  jira-mock:
    build: ./mock-services/jira-mock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    env_file: .env
    volumes:
      - jira_data:/data
    networks:
      - cortex_net

  slack-mock:
    build: ./mock-services/slack-mock
    ports:
      - "8090:8090"
    volumes:
      - slack_data:/data
    networks:
      - cortex_net

  indexer:
    build: ./indexer
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    env_file: .env
    restart: "no"
    command: python index_codebase.py
    networks:
      - cortex_net

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      SECRET_KEY: secret
      DATABASE_URL: postgresql://cortex:cortex_pass@postgres:5432/incident_cortex
      NEXTAUTH_SECRET: secret
      NEXTAUTH_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cortex_net

volumes:
  postgres_data:
  chroma_data:
  jira_data:
  slack_data:

networks:
  cortex_net:
    driver: bridge
