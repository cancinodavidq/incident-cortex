<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Incident Cortex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:        #0d0f14;
        --surface:   #13161e;
        --surface2:  #1a1d27;
        --border:    #252836;
        --border2:   #2f3347;
        --text:      #e4e6f0;
        --text2:     #8b90a8;
        --text3:     #555a72;
        --accent:    #5b6af0;
        --accent-bg: rgba(91,106,240,0.12);
        --green:     #22c55e;
        --red:       #ef4444;
        --orange:    #f97316;
        --yellow:    #eab308;
      }
      html { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
      body { min-height: 100vh; }
      code, .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; font-family: inherit; }
      input, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--surface); }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
